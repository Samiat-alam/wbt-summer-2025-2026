<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title>Registration</title>
    </head>

    <body>
        <form class = "card">
            <div class= "card-header">
                <h1>Registration</h1>
                <p class=eyebrow><span class="dot"></span>Please complete all fields below.</p>
            </div>

            <div class="card-body">
                <div class="field">
                    <label for="name">Full Name</label></br>
                    <input type="text" id="name" placeholder="Jane Doe">
                </div>

                <div class="field">
                    <label for="code">Postal Code</label></br>
                    <input type="number" id="code" placeholder="10001">
                </div>

                <div class="field">
                    <label for="dob">Date of Birth</label></br>
                    <input type="date" id="dob" placeholder="25/06/2026">
                </div>

                <div class="field">
                    <label for="email">Email Address</label></br>
                    <input type="email" id="email" placeholder="jane@example.com">
                </div>

                <div class="field">
                    <label for="password">Password</label></br>
                    <input type="password" id="password" placeholder="*******">
                </div>

                <div class="field">
                    <label for="country">Country</label></br>
                    <select id="country" name="country">

                        <option value=""selected disabled>Select a Country</option>
                        <option value="bangladesh">Bangladesh</option>
                        <option value="pakistan">Pakistan</option>
                        <option value="nepal">Nepal</option>
                        <option value="bhutan">Bhutan</option>
                        <option value="thailand">Thailand</option>
                        <option value="malaysia">Malaysia</option>
                        <option value="singapore">Singapore</option>
                        <option value="srilanka">Sri Lanka</option>
                    </select>
                </div></br>

                <div class="buttons">
                     <button type="submit" class="btn-primary">Submit</button>
                     <button type="reset" class="btn-secondary">Reset</button>
                </div>


            </div>
        </form>
