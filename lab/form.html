<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title>Donor Information</title>
    </head>
    <body>
        <form method ="post">
            <h2>
                <font color="red">Donor Information</font>
            </h2>
            
            <table>
                    <tr>
                        <td><label for="firstname">First Name*:</label></td>
                        <td><input type="text" id="firstname" name="firstname" required></td>
                    </tr>
                    <tr>
                        <td><label for="lastname">Last Name*:</label></td>
                        <td><input type="text" id="lastname" name="lastname" required></td>
                    </tr>
                    <tr>
                        <td><label for="company">Company:</label></td>
                        <td><input type="text" id="company" name="company"></td>
                    </tr>
                    <tr>
                        <td><label for="address1">Address 1*:</label></td>
                        <td><input type="text" id="address1" name="address1" required></td>
                    </tr>
                    <tr>
                        <td><label for="address2">Address 2:</label></td>
                        <td><input type="text" id="address2" name="address2"></td>
                    </tr>
                    <tr>
                        <td><label for="city">City*:</label></td>
                        <td><input type="text" id="city" name="city" required></td>
                    </tr>
                    <tr>
                    <td><label for="state">State*:</label></td>

                    <td><select id="state" name="state">

                        <option value=""selected disabled>Select a State</option>
                        <option value="dhaka">Dhaka</option>
                        <option value="chattogram">Chattogram</option>
                        <option value="rajshahi">Rajshahi</option>
                        <option value="khulna">Khulna</option>
                        <option value="barishal">Barishal</option>
                        <option value="sylhet">Sylhet</option>
                        <option value="rangpur">Rangpur</option>
                        <option value="mymensingh">Mymensingh</option></td>
                    </select>
                    </tr>
                    <tr>
                        <td><label for="zip">Zip Code*:</label></td>
                        <td><input type="number" id="zip" name="zip" required></td>
                    </tr>
                    <td><label for="country">Country*:</label></td>

                    <td><select id="country" name="country">

                        <option value=""selected disabled>Select a Country</option>
                        <option value="bangladesh">Bangladesh</option>
                        <option value="pakistan">Pakistan</option>
                        <option value="nepal">Nepal</option>
                        <option value="bhutan">Bhutan</option>
                        <option value="thailand">Thailand</option>
                        <option value="malaysia">Malaysia</option>
                        <option value="singapore">Singapore</option>
                        <option value="srilanka">Sri Lanka</option></td>
                    </select>
                    </tr>
                    <tr>
                        <td><label for="phone">Phone:</label></td>
                        <td><input type="number" id="phone" name="phone"></td>
                    </tr>
                    <tr>
                        <td><label for="fax">Fax:</label></td>
                        <td><input type="number" id="fax" name="fax"></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email*:</label></td>
                        <td><input type="email" id="email" name="email" required></td>
                    </tr>
                    <tr>
                        <td><label>Donation Amount*:</label><br>
                        <small>(Check a button or type in your amount) </small></td>
                        <td>
                            <input type="radio" name="amount" value="none">None
                            <input type="radio" name="amount" value="$50">$50
                            <input type="radio" name="amount" value="$75">$75
                            <input type="radio" name="amount" value="$100">$100
                            <input type="radio" name="amount" value="$250">$250
                            <input type="radio" name="amount" value="other">Other
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><label for="otheramount">Other Amount $</label>
                            <input type="number" id="otheramount" name="otheramount">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="donation">Recurring Donation</label><br>
                        <small>(Check if yes)</small></td>
                        <td><input type="checkbox" name="yes">I am interested in giving on a regular basis</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><label for="creditcard">Monthly Credit Card $</label>
                            <input type="number" id="creditcard" name="creditcard">
                            <label for="for">For</label>
                            <input type="number" id="months" name="months">
                            <label for="months">Months</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                        <button type="button">Reset</button>
                        <button type="button">Continue</button>
                        </td>
                    </tr>

            </table>
        </form>
    </body>
