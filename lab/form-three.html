<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title>Registration</title>
    </head>

    <body>
        <form class = "card">
            <div class= "card-header">
                <h1>Create you account</h1>
                <p class=eyebrow><span class="dot"></span>join us in a couple of steps.</p>
            </div>

            <div class="card-body">
                <div class="field">
                    <label for="name">Full Name</label></br>
                    <input type="text" id="name" placeholder="Jane Doe">
                </div>

                <div class="field">
                    <label for="age">Age</label></br>
                    <input type="number" id="age" placeholder="28">
                </div>

                <div class="field">
                    <label for="dob">Date of Birth</label></br>
                    <input type="date" id="dob" placeholder="25/06/2026">
                </div>

                <div class="field">
                    <label for="email">Email Address</label></br>
                    <input type="email" id="email" placeholder="jane@example.com">
                </div>

                <div class="field">
                    <label for="password">Password</label></br>
                    <input type="password" id="password" placeholder="*******">
                </div>

                <div class="field">
                    <label for="contact">Preferred Contact</label></br>
                    <input type="radio" name="contact" value="email">Email
                    <input type="radio" name="contact" value="phone">Phone
                    <input type="radio" name="contact" value="sms">SMS
                </div></br>

                <div class="buttons">
                     <button type="submit" class="btn-primary">Submit</button>
                     <button type="reset" class="btn-secondary">Reset</button>
                </div>


            </div>
        </form>
